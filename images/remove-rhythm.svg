<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" role="img" aria-labelledby="title desc">
  <title id="title">Remove the rhythm</title>
  <desc id="desc">Notes with mixed rhythms become the same pitches as even quarter notes</desc>

  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Left: variable rhythm -->
  <g transform="translate(28, 28)">
    <text x="0" y="0" fill="#9898ae" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">VARIABLE RHYTHM</text>

    <!-- Staff -->
    <g transform="translate(0, 24)" stroke="#3a3a52" stroke-width="1.2">
      <line x1="0" y1="0" x2="250" y2="0"/>
      <line x1="0" y1="14" x2="250" y2="14"/>
      <line x1="0" y1="28" x2="250" y2="28"/>
      <line x1="0" y1="42" x2="250" y2="42"/>
      <line x1="0" y1="56" x2="250" y2="56"/>
    </g>

    <!-- Mixed-duration notes, uneven horizontal spacing -->
    <g fill="#f0f0f5">
      <!-- Quarter -->
      <g transform="translate(36, 45)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
      </g>
      <!-- Eighth -->
      <g transform="translate(72, 52)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
        <path d="M8.4 -34 C20 -30 22 -18 8.4 -12" fill="none" stroke="#f0f0f5" stroke-width="2.3"/>
      </g>
      <!-- Sixteenth -->
      <g transform="translate(96, 59)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
        <path d="M8.4 -34 C20 -30 22 -18 8.4 -12" fill="none" stroke="#f0f0f5" stroke-width="2.1"/>
        <path d="M8.4 -25 C20 -21 22 -11 8.4 -5" fill="none" stroke="#f0f0f5" stroke-width="2.1"/>
      </g>
      <!-- Dotted quarter -->
      <g transform="translate(136, 66)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
        <circle cx="13" cy="2.5" r="2.3"/>
      </g>
      <!-- Eighth -->
      <g transform="translate(182, 73)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
        <path d="M8.4 -34 C20 -30 22 -18 8.4 -12" fill="none" stroke="#f0f0f5" stroke-width="2.3"/>
      </g>
      <!-- Half (open head) -->
      <g transform="translate(212, 80)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)" fill="none" stroke="#f0f0f5" stroke-width="2"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1" fill="#f0f0f5"/>
      </g>
    </g>

    <!-- Duration bars: uneven lengths -->
    <g transform="translate(36, 108)" fill="#6b6b82">
      <rect x="-6" y="0" width="28" height="4" rx="2"/>
      <rect x="30" y="0" width="14" height="4" rx="2"/>
      <rect x="54" y="0" width="8" height="4" rx="2"/>
      <rect x="94" y="0" width="42" height="4" rx="2"/>
      <rect x="140" y="0" width="14" height="4" rx="2"/>
      <rect x="170" y="0" width="56" height="4" rx="2"/>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(300, 92)">
    <line x1="0" y1="0" x2="58" y2="0" stroke="url(#arrowGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M48 -9 L62 0 L48 9" fill="none" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right: all quarter notes -->
  <g transform="translate(390, 28)">
    <text x="0" y="0" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">EVEN QUARTERS</text>

    <g transform="translate(0, 24)" stroke="#3a3a52" stroke-width="1.2">
      <line x1="0" y1="0" x2="262" y2="0"/>
      <line x1="0" y1="14" x2="262" y2="14"/>
      <line x1="0" y1="28" x2="262" y2="28"/>
      <line x1="0" y1="42" x2="262" y2="42"/>
      <line x1="0" y1="56" x2="262" y2="56"/>
    </g>

    <!-- Same pitches, all quarters, even spacing -->
    <g fill="#818cf8">
      <g transform="translate(36, 45)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
      </g>
      <g transform="translate(74, 52)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
      </g>
      <g transform="translate(112, 59)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
      </g>
      <g transform="translate(150, 66)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
      </g>
      <g transform="translate(188, 73)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
      </g>
      <g transform="translate(226, 80)">
        <ellipse cx="0" cy="0" rx="7.5" ry="5.4" transform="rotate(-22)"/>
        <rect x="6" y="-34" width="2.4" height="34" rx="1"/>
      </g>
    </g>

    <!-- Even duration bars -->
    <g transform="translate(36, 108)" fill="#818cf8" opacity="0.75">
      <rect x="-6" y="0" width="24" height="4" rx="2"/>
      <rect x="32" y="0" width="24" height="4" rx="2"/>
      <rect x="70" y="0" width="24" height="4" rx="2"/>
      <rect x="108" y="0" width="24" height="4" rx="2"/>
      <rect x="146" y="0" width="24" height="4" rx="2"/>
      <rect x="184" y="0" width="24" height="4" rx="2"/>
    </g>
  </g>
</svg>
